services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        # Fails `docker compose build` when `.env` is missing or `API_STATIC_KEY` is unset (copy from `.env.example`).
        _REQUIRE_DOTENV: ${API_STATIC_KEY:?Copy .env.example to .env before docker compose}
    env_file: .env
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Override host-oriented REDIS_URL from `.env` so the container talks to the `redis` service.
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
